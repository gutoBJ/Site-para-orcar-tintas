<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer orçamento - Forms</title>
  <link rel="shortcut icon" href="../assets/paint-brush.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-r from-gray-400 to-gray-700">
  <!-- CONTAINER PRINCIPAL -->
  <div class="max-w-5xl mx-auto mt-16 mb-10 bg-white p-10 rounded-2xl shadow-xl">

    <!-- BOTÃO VOLTAR -->
    <a href="./orcamento.html"
      class="inline-block mb-6 text-sm text-gray-600 hover:text-[#c96e07] transition">
      ← Voltar
    </a>

    <!-- TÍTULO -->
    <h1 class="text-3xl font-bold mb-8">
      Solicitar Orçamento
    </h1>

    <!-- GRID -->
    <div class="grid md:grid-cols-2 gap-10">

      <!-- FORMULÁRIO -->
      <form action="https://formsubmit.co/gutochupernate2@gmail.com" method="POST" class="space-y-5">

        <div>
          <label class="block text-sm font-semibold mb-1">Nome</label>
          <input type="text" placeholder="Seu nome"
            class="w-full p-3 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500" name="nome" required>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Email</label>
          <input type="email" placeholder="seu@email.com"
            class="w-full p-3 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500" name="email" required>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Telefone</label>
          <input type="text" placeholder="(00) 00000-0000"
            class="w-full p-3 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500" name="telefone" required>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Cidade</label>
          <input type="text"
            class="w-full p-3 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500" name="cidade" required>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Detalhes do projeto</label>
          <textarea rows="4" placeholder="Ex: pintura interna, externa, metragem..."
            class="w-full p-3 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500" name="detalhes" required></textarea>
        </div>

        <!-- BOTÃO -->
        <button type="submit"
          class="w-full bg-[#c96e07] text-white py-3 rounded-lg hover:bg-[#9e5809] transition duration-300 font-semibold">
          Enviar Orçamento
        </button>

        <input type="hidden" name="_subject" value="Novo Orçamento - Site">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

      </form>

      <!-- PRODUTOS SELECIONADOS -->
      <div>

        <h2 class="text-xl font-semibold mb-4">
          Tintas Selecionadas
        </h2>

        <div id="listaSelecionados"
          class="space-y-3 max-h-80 overflow-y-auto pr-2">

          <!-- JS preenche aqui -->

          <!-- EXEMPLO VISUAL -->
          <!--
          <div class="flex justify-between items-center p-3 border rounded-lg bg-gray-50">
            <span class="text-sm font-medium">Tinta Acrílica Premium</span>
            <button class="text-red-500 text-sm hover:underline">Remover</button>
          </div>
          -->

        </div>

        <!-- CAIXA DECORATIVA (TESTE GRADIENTE) -->
        <div class="mt-6 w-full h-32 rounded-xl bg-gradient-to-r from-gray-200 to-gray-300 flex items-center justify-center text-gray-600">
          Área de resumo / total (opcional)
        </div>

      </div>

    </div>

    <input type="hidden" name="produtos" id="inputProdutos">
    <input type="hidden" name="_next" value="https://seusite.com/obrigado.html">
  </div>

  <script src="../scripts/form.js"></script>

</body>
</html>
