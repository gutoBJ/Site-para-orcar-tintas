    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header class="w-full h-40 flex justify-around items-center shadow-xl">
        <a href="../index.html">
            <img class="w-60 h-28" src="../assets/stil-color.png" alt="Logo StilCor">
        </a>
        <nav class="w-2/4 h-full">
            <ul class="w-full h-full flex justify-around items-center">
                <li>
                    <a href="../index.html" class="hover:text-[#9e5809] font-semibold">Home</a>
                </li>
                <li>
                    <a href="./empresa.html" class="hover:text-[#9e5809] font-semibold">Empresa</a>
                </li>
                <li>
                    <a href="./portfolio.html" class="hover:text-[#9e5809] font-semibold">Portfólio</a>
                </li>
                <li>
                    <a href="./downloads.html" class="hover:text-[#9e5809] font-semibold">Downloads</a>
                </li>
                <li>
                    <a href="./contato.html" class="hover:text-[#9e5809] font-semibold">Contato</a>
                </li>
                <li>
                    <a href="./orcamento.html">
                        <button class="bg-[#c96e07] p-2 rounded-xl hover:bg-[#9e5809] text-white transition duration-800 ease-in-out">Fazer orçamento</button>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="max-w-6xl mx-auto mt-10 px-6">
        <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
            <div class="flex flex-col items-center gap-3">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-300 border-t-[#c96e07]"></div>
                <p class="text-gray-500 text-sm">Carregando produtos...</p>
            </div>
        </div>
        <div id="produtos" class="grid grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-[0_35px_60px_-15px_rgba(0,0,0,0.6)]
 max-w-md w-full relative">

            <button id="fecharModal"
      class="absolute top-2 right-2 text-gray-600 hover:text-black cursor-pointer">
      ✕
            </button>

            <div id="modalConteudo"></div>

        </div>
    </div>

    <script src="../scripts/portfólio.js"></script>

</html>
